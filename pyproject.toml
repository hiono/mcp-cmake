[project]
name = "mcp-cmake"
version = "0.1.0"
description = "MCP server for CMake project management using Gradio"
requires-python = ">=3.12"
dependencies = [
    "gradio[mcp]>=4.0",
]

[project.scripts]
mcp-cmake = "mcp_cmake:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
